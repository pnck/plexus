version: '3'

tasks:
  build:
    desc: Build the plexus binary
    cmds:
      - go build -o bin/plexus ./internal/bin/plexus
      - go build ./...

  build:debug:
    desc: Build a debuggable plexus (embeds the debug bwrap, keeps Go symbols, no inlining)
    cmds:
      - go build -tags debug -gcflags=all='-N -l' -o bin/plexus-debug ./internal/bin/plexus

  run:
    desc: Run the plexus binary
    cmds:
      - go run ./internal/bin/plexus

  test:
    desc: Run all tests
    cmds:
      - go test -v -count=1 ./...

  test:smoke:
    desc: Run smoke tests
    cmds:
      - go test -v -count=1 ./test/smoke_test.go

  lint:
    desc: Run golangci-lint
    cmds:
      # Pinned + generous timeout: `@latest` is non-reproducible and the default 1m
      # analysis deadline is blown loading the modernc sqlite/libc packages on a cold
      # cache (what turned CI red). Compiled by the local Go toolchain, so its go/types
      # matches the module's Go version.
      - go run github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8 run --timeout=10m
