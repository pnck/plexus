name: Plexus CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Install Task
      uses: go-task/setup-task@v2
      with:
        version: '3.x'

    - name: Lint
      run: task lint

    - name: Test
      run: task test
