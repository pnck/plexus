name: Plexus CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: '1.25'
  # bwrap (bubblewrap) source tag; bump to embed a newer sandbox helper.
  BUBBLEWRAP_VERSION: v0.11.2

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: go-task/setup-task@v2
        with:
          version: '3.x'
      - name: Lint
        run: task lint

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: go-task/setup-task@v2
        with:
          version: '3.x'
      - name: Test
        run: task test

  # Build self-contained plexus binaries per architecture, in two variants: a release
  # binary embedding an optimized bwrap, and a debug binary (-tags debug, Go symbols +
  # no inlining) embedding a -O0 -g bwrap so the sandbox helper is debuggable too.
  # plexus is pure Go (modernc sqlite, no cgo) so the Go build runs natively on each
  # arch runner; bwrap is a C program, built as a fully-static musl binary in an Alpine
  # container of the same arch (no QEMU, no cross toolchain).
  build:
    name: build (${{ matrix.arch }})
    needs: [ lint, test ]
    permissions:
      contents: write   # attach binaries to the GitHub Release on tag pushes
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # Both bwrap variants are fully-static (musl), so each plexus binary runs on any
      # Linux host. Cache them per (version, arch) — only pay the compile once.
      - name: Cache static bwrap
        id: bwrap-cache
        uses: actions/cache@v4
        with:
          path: |
            sandbox/bwrap/bin/bwrap_linux_${{ matrix.arch }}
            sandbox/bwrap/bin/bwrap_linux_${{ matrix.arch }}_debug
          key: bwrap-${{ env.BUBBLEWRAP_VERSION }}-${{ matrix.arch }}-musl-static-v2

      - name: Build static bwrap — release + debug (${{ matrix.arch }})
        if: steps.bwrap-cache.outputs.cache-hit != 'true'
        run: |
          docker run --rm \
            -e BUBBLEWRAP_VERSION="${BUBBLEWRAP_VERSION}" \
            -e ARCH="${{ matrix.arch }}" \
            -v "$PWD:/work" -w /work \
            alpine:3.21 sh -euxc '
              apk add --no-cache build-base meson samurai pkgconf \
                libcap-dev libcap-static linux-headers git
              git clone --depth 1 --branch "$BUBBLEWRAP_VERSION" \
                https://github.com/containers/bubblewrap /tmp/bwrap-src
              cd /tmp/bwrap-src
              # release -> optimized/stripped-ish; debug -> -O0 -g, assertions, unstripped.
              for pair in "release:bwrap_linux_${ARCH}" "debug:bwrap_linux_${ARCH}_debug"; do
                bt="${pair%%:*}"; out="${pair##*:}"
                meson setup "_build_${bt}" \
                  --buildtype="${bt}" \
                  --prefer-static \
                  -Db_pie=false \
                  -Ddefault_library=static \
                  -Dc_link_args=-static \
                  -Dc_args=-Wno-format-overflow \
                  -Dselinux=disabled \
                  -Dman=disabled \
                  -Dtests=false \
                  -Dbash_completion=disabled \
                  -Dzsh_completion=disabled
                meson compile -C "_build_${bt}"
                install -Dm755 "_build_${bt}/bwrap" "/work/sandbox/bwrap/bin/${out}"
                file  "/work/sandbox/bwrap/bin/${out}"
                "/work/sandbox/bwrap/bin/${out}" --version
              done
            '

      - name: Verify both embedded bwraps are present and non-empty
        run: |
          for f in \
            "sandbox/bwrap/bin/bwrap_linux_${{ matrix.arch }}" \
            "sandbox/bwrap/bin/bwrap_linux_${{ matrix.arch }}_debug"; do
            test -s "$f" || { echo "::error::$f is empty — bwrap build failed"; exit 1; }
            ls -la "$f"
          done

      - name: Build plexus — release + debug (${{ matrix.arch }})
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist
          # release: trimmed + stripped, embeds the optimized bwrap.
          go build -trimpath -ldflags='-s -w' \
            -o "dist/plexus-linux-${{ matrix.arch }}" ./internal/bin/plexus
          # debug: keep Go symbols, disable optimization/inlining, embed the debug bwrap.
          go build -tags debug -gcflags=all='-N -l' \
            -o "dist/plexus-linux-${{ matrix.arch }}-debug" ./internal/bin/plexus
          ls -la dist/

      # The runner arch matches matrix.arch, so the freshly built binaries run here.
      - name: Smoke — binaries start
        run: |
          ./dist/plexus-linux-${{ matrix.arch }} --help >/dev/null
          ./dist/plexus-linux-${{ matrix.arch }}-debug --help >/dev/null

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: plexus-linux-${{ matrix.arch }}
          path: dist/plexus-linux-${{ matrix.arch }}
          if-no-files-found: error

      - name: Upload debug binary
        uses: actions/upload-artifact@v4
        with:
          name: plexus-linux-${{ matrix.arch }}-debug
          path: dist/plexus-linux-${{ matrix.arch }}-debug
          if-no-files-found: error

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" --generate-notes --title "${GITHUB_REF_NAME}" || true
          gh release upload "${GITHUB_REF_NAME}" \
            "dist/plexus-linux-${{ matrix.arch }}" \
            "dist/plexus-linux-${{ matrix.arch }}-debug" --clobber

  # Runtime smoke of the zero-privilege sandbox on a REAL unprivileged-userns host.
  # GitHub's ubuntu runners are full VMs that permit user namespaces, so this exercises
  # the whole launch -> fence -> jail -> confine chain with the CI-built binary (which
  # embeds bwrap) and asserts the agent reaches the confined stage. It is the one runtime
  # check the dev/CI container itself cannot perform — a session seccomp filter there
  # blocks clone(CLONE_NEWUSER), so the sandbox can only be exercised on a full-VM runner.
  smoke-sandbox:
    name: smoke sandbox (${{ matrix.arch }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Download the release binary (embeds bwrap)
        uses: actions/download-artifact@v4
        with:
          name: plexus-linux-${{ matrix.arch }}
          path: dl

      - name: Enable + verify unprivileged user namespaces
        run: |
          # Ubuntu 23.10+/24.04 gate unprivileged userns behind an AppArmor restriction;
          # relax it for this VM (runners have passwordless sudo). Keys are guarded — they
          # exist only on some kernels.
          if [ -e /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
          if [ -e /proc/sys/kernel/unprivileged_userns_clone ]; then
            sudo sysctl -w kernel.unprivileged_userns_clone=1
          fi
          echo "user.max_user_namespaces=$(cat /proc/sys/user/max_user_namespaces)"
          unshare -Urn true \
            && echo "unprivileged user+net namespace: OK" \
            || { echo "::error::runner cannot create an unprivileged userns — smoke is inconclusive"; exit 1; }

      - name: Smoke — degraded (no cap) + full fence (CAP_NET_ADMIN)
        run: |
          bin=$(find dl -name "plexus-linux-${{ matrix.arch }}" -type f | head -1)
          test -n "$bin" || { echo "::error::built binary not found in the downloaded artifact"; exit 1; }
          chmod +x "$bin"

          # (1) Degraded path — NO CAP_NET_ADMIN: the network fence is skipped, the agent
          # runs on the host network (fs/seccomp still isolate), and it WARNS. It must still
          # reach the confined stage.
          set +e; timeout 25 "$bin" run --sandbox --id ci-degraded >degraded.log 2>&1; set -e
          echo "----- degraded (no CAP_NET_ADMIN) -----"; cat degraded.log; echo "----------"
          grep -q "network fence disabled" degraded.log || { echo "::error::degraded run must warn 'network fence disabled'"; exit 1; }
          grep -q "sandbox active" degraded.log        || { echo "::error::degraded run must still reach the confined stage"; exit 1; }

          # (2) Full fence — CAP_NET_ADMIN via root (`sudo`), NOT `setcap`: a file-capability
          # binary can't create the unprivileged userns the netns needs (secure-exec EPERM),
          # so the cap must come from root / a privileged container / --cap-add=NET_ADMIN.
          # launch -> fence (veth + nft + TPROXY) -> jail -> confine runs the whole chain;
          # redirect exercises the TPROXY reroute. Success is the marker, not the exit code.
          set +e; sudo timeout 25 "$bin" run --sandbox --net-tcp redirect --net-udp redirect --id ci-smoke >smoke.log 2>&1; set -e
          echo "----- full fence (root / CAP_NET_ADMIN) -----"; cat smoke.log; echo "----------"
          if grep -q "sandbox active" smoke.log; then
            echo "launch -> fence(veth/nft/TPROXY) -> jail -> confine all succeeded"
          else
            echo "::error::full-fence chain did not reach confine — see log (fence veth/nft/TPROXY or bwrap error)"
            exit 1
          fi

  # In-sandbox ENFORCEMENT self-test (dev/CI only, -tags sandboxtest). Where smoke-sandbox
  # proves the sandbox STARTS, this proves it CONFINES: it builds a sandboxtest-tagged
  # plexus (embedding bwrap from the build job's cache) and runs `sandbox-selftest`, which
  # enters launch->fence->jail->confine and asserts each isolation property from inside
  # (netns loopback-only, external egress fenced, seccomp active, rlimits lowered, /tmp
  # tmpfs, /proc procfs, cgroup when delegated). The build tag keeps all of this out of
  # production and local default builds.
  sandbox-enforce:
    name: sandbox enforcement (${{ matrix.arch }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Restore static bwrap (populated by the build job)
        uses: actions/cache/restore@v4
        with:
          path: |
            sandbox/bwrap/bin/bwrap_linux_${{ matrix.arch }}
            sandbox/bwrap/bin/bwrap_linux_${{ matrix.arch }}_debug
          key: bwrap-${{ env.BUBBLEWRAP_VERSION }}-${{ matrix.arch }}-musl-static-v2

      - name: Verify embedded bwrap present
        run: |
          test -s "sandbox/bwrap/bin/bwrap_linux_${{ matrix.arch }}" \
            || { echo "::error::bwrap cache miss — the build job should have populated it"; exit 1; }

      - name: Build plexus with the sandboxtest tag (embeds bwrap)
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
        run: go build -tags sandboxtest -o plexus ./internal/bin/plexus

      - name: Enable + verify unprivileged user namespaces
        run: |
          if [ -e /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
          if [ -e /proc/sys/kernel/unprivileged_userns_clone ]; then
            sudo sysctl -w kernel.unprivileged_userns_clone=1
          fi
          unshare -Urn true \
            && echo "unprivileged user+net namespace: OK" \
            || { echo "::error::runner cannot create an unprivileged userns — enforcement test inconclusive"; exit 1; }

      - name: Run in-sandbox enforcement self-test
        run: |
          # The network fence needs CAP_NET_ADMIN, and it must come from root (`sudo`), NOT
          # `setcap`: a file-capability binary can't create the unprivileged userns the netns
          # needs. Compile the test binary as the normal user, then run it under sudo so it
          # (and the plexus it execs) is root; the launcher's cap is dropped before the agent
          # runs, which the no-caps check asserts.
          go test -c -tags sandboxtest -o enforce.test ./internal/sandboxtest
          # Plant a "secret" under a ro-bound host path and mask it, so the fs-masked
          # check proves masking actually HIDES it inside the sandbox (fs-isolation).
          probe="$HOME/plexus-mask-probe"
          mkdir -p "$probe" && echo "top-secret" > "$probe/secret"
          set +e
          sudo env PLEXUS_BIN="$PWD/plexus" PLEXUS_SELFTEST_MASK="$probe" \
            ./enforce.test -test.run TestSandboxEnforcement -test.v 2>&1 | tee enforce.out
          rc=${PIPESTATUS[0]}
          set -e
          # Guard against a silent no-op: the test SKIPs (exit 0) if PLEXUS_BIN didn't reach
          # it, so require a real in-sandbox check line before trusting the exit code.
          grep -q "\[PASS\] netns-fenced" enforce.out || { echo "::error::self-test did not run inside the sandbox (no 'netns-fenced' check) — env not passed or chain broke at entry"; exit 1; }
          test "$rc" -eq 0 || { echo "::error::enforcement self-test failed (exit $rc) — see the [FAIL] line(s) above"; exit 1; }
